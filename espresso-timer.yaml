# ============================================================
#  Espresso Timer — ESPHome Configuration
#  Board: ESP32-WROOM-DA
#  Hardware: SSD1306 128x32 OLED (I2C 0x3C), Reed switch GPIO16
# ============================================================
esphome:
  name: espresso-timer
  friendly_name: Espresso Timer
  min_version: 2025.11.0
  name_add_mac_suffix: false
esp32:
  board: esp32dev   # ESP32-WROOM-DA uses the generic esp32dev board definition
  framework:
    type: arduino
# ── Logging ──────────────────────────────────────────────────
logger:
# ── Home Assistant API ────────────────────────────────────────
api:
# ── OTA Updates ──────────────────────────────────────────────
ota:
  - platform: esphome
    password: !secret ota_password
# ── WiFi ─────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:                           # Fallback hotspot if WiFi drops
    ssid: "Espresso Timer AP"
    password: !secret ap_password
captive_portal:
# ── NTP Time ─────────────────────────────────────────────────
time:
  - platform: sntp
    id: sntp_time
    timezone: "America/Chicago"
    servers:
      - pool.ntp.org
    # Reset the daily shot counter at midnight
    on_time:
      - seconds: 0
        minutes: 0
        hours: 0
        then:
          - globals.set:
              id: shots_today
              value: "0"
          - sensor.template.publish:
              id: daily_shot_count
              state: "0"
# ── I2C Bus ───────────────────────────────────────────────────
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
# ── Fonts ────────────────────────────────────────────────────
font:
  - file: "gfonts://Roboto"
    id: font_timer
    size: 30
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
# ── Global Variables ─────────────────────────────────────────
globals:
  - id: timer_running
    type: bool
    restore_value: no
    initial_value: "false"
  - id: start_time_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: elapsed_seconds
    type: int
    restore_value: no
    initial_value: "0"
  - id: last_shot_seconds
    type: int
    restore_value: yes
    initial_value: "0"
  - id: shots_today
    type: int
    restore_value: yes
    initial_value: "0"
# ── Display On/Off Switch ─────────────────────────────────────
# Expose a switch to Home Assistant so any automation can wake/sleep
# the display — e.g. tie it to your espresso machine smart plug.
# The state is restored after a reboot so it survives power cycles.
switch:
  - platform: template
    name: "Display"
    id: display_on
    icon: "mdi:monitor"
    restore_mode: RESTORE_DEFAULT_ON   # display on after first flash; remembered thereafter
    optimistic: true                   # state is set immediately when toggled
    turn_on_action:
      - lambda: "id(oled).turn_on();"
    turn_off_action:
      - lambda: "id(oled).turn_off();"
# ── Reed Switch ──────────────────────────────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO16
      mode:
        input: true
        pullup: true
      inverted: true
    id: reed_switch
    name: "Espresso Group Active"
    device_class: running
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - globals.set:
            id: timer_running
            value: "true"
        - globals.set:
            id: elapsed_seconds
            value: "0"
        - lambda: "id(start_time_ms) = millis();"
    on_release:
      then:
        - globals.set:
            id: timer_running
            value: "false"
        - lambda: "id(last_shot_seconds) = id(elapsed_seconds);"
        - sensor.template.publish:
            id: last_shot_duration
            state: !lambda "return id(last_shot_seconds);"
        - lambda: |-
            if (id(last_shot_seconds) >= 15) {
              id(shots_today) += 1;
              id(daily_shot_count).publish_state(id(shots_today));
            }
# ── Sensors ──────────────────────────────────────────────────
sensor:
  - platform: template
    name: "Last Shot Duration"
    id: last_shot_duration
    unit_of_measurement: "s"
    icon: "mdi:coffee"
    accuracy_decimals: 0
    state_class: measurement
  - platform: template
    name: "Current Shot Duration"
    id: current_shot_duration
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    accuracy_decimals: 0
    state_class: measurement
    update_interval: 1s
    lambda: |-
      if (!id(display_on).state) return NAN;
      if (id(timer_running)) {
        return (millis() - id(start_time_ms)) / 1000.0;
      }
      return 0;
  - platform: template
    name: "Shots Today"
    id: daily_shot_count
    icon: "mdi:coffee-outline"
    accuracy_decimals: 0
    state_class: total_increasing
# ── SSD1306 128×32 OLED Display ──────────────────────────────
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x32"
    address: 0x3C
    id: oled
    update_interval: 100ms
    lambda: |-
      if (id(timer_running)) {
        id(elapsed_seconds) = (millis() - id(start_time_ms)) / 1000;
        it.printf(
          64, 16,
          id(font_timer),
          TextAlign::CENTER,
          "%d", id(elapsed_seconds)
        );
      } else {
        it.printf(
          0, 2,
          id(font_small),
          "LAST SHOT: %3ds", id(last_shot_seconds)
        );
        if (id(sntp_time).now().is_valid()) {
          it.strftime(
            0, 18,
            id(font_small),
            "%H:%M:%S", id(sntp_time).now()
          );
        } else {
          it.print(0, 18, id(font_small), "Syncing time...");
        }
      }
